<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6" id="course-grid">
    {% for course in courses %}
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden hover:shadow-lg transition-shadow duration-300 group flex flex-col">
        <div class="h-48 bg-gray-200 relative">
            {% if course.image %}
            <img src="{{ course.image.url }}" alt="{{ course.title }}" class="w-full h-full object-cover">
            {% else %}
            <div class="w-full h-full flex items-center justify-center bg-indigo-50 text-indigo-200">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            {% endif %}
            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-2 py-1 rounded text-xs font-medium text-gray-700 shadow-sm">
                {{ course.category.name }}
            </div>
        </div>
        <div class="p-5 flex-grow flex flex-col">
            <h3 class="text-xl font-bold text-dark mb-2 group-hover:text-brand transition-colors"><a href="{% url 'course_detail' course.slug %}">{{ course.title }}</a></h3>
            <div class="flex items-center text-sm text-gray-500 mb-4">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                {{ course.duration_months }} oy
            </div>
            <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Oyiga</p>
                    <p class="text-lg font-bold text-dark">{{ course.monthly_payment|floatformat:0 }} so'm</p>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-span-full py-12 text-center text-gray-500 bg-white rounded-xl border border-gray-100">
        Ushbu toifada hozircha kurslar mavjud emas.
    </div>
    {% endfor %}
</div>
