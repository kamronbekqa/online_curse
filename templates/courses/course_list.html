{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 py-8 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Breadcrumb & Title -->
        <div class="mb-8">
            <nav class="flex text-sm text-gray-500 mb-4">
                <a href="{% url 'home' %}" class="hover:text-brand">Bosh sahifa</a>
                <span class="mx-2">/</span>
                <span class="text-gray-900">Kurslar</span>
            </nav>
            <h1 class="text-3xl font-bold text-dark">Barcha kurslar</h1>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <!-- Sidebar / Filters -->
            <aside class="w-full md:w-1/4">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm sticky top-24">
                    <div class="mb-6">
                        <label for="search" class="block text-sm font-medium text-gray-700 mb-2">Qidiruv</label>
                        <div class="relative">
                            <input type="text" name="q" id="search" 
                                   value="{{ search_query|default:'' }}"
                                   hx-get="{% url 'course_list' %}"
                                   hx-trigger="keyup changed delay:500ms, search"
                                   hx-target="#course-grid-container"
                                   hx-include="[name='category']"
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm" 
                                   placeholder="Kurs nomi...">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="category" value="{{ selected_category|default:'' }}">

                    <h3 class="text-lg font-bold mb-4 border-b pb-2">Toifalar</h3>
                    <ul class="space-y-2">
                        <li>
                            <a href="{% url 'course_list' %}{% if search_query %}?q={{ search_query }}{% endif %}" 
                               hx-get="{% url 'course_list' %}" 
                               hx-target="#course-grid-container" 
                               hx-push-url="true"
                               hx-include="[name='q']"
                               class="block py-2 px-3 rounded-md transition-colors {% if not selected_category %}bg-indigo-50 text-brand font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                                Barcha kurslar
                            </a>
                        </li>
                        {% for category in categories %}
                        <li>
                            <a href="{% url 'course_list' %}?category={{ category.slug }}{% if search_query %}&q={{ search_query }}{% endif %}" 
                               hx-get="{% url 'course_list' %}?category={{ category.slug }}" 
                               hx-target="#course-grid-container" 
                               hx-push-url="true"
                               hx-include="[name='q']"
                               class="block py-2 px-3 rounded-md transition-colors {% if selected_category == category.slug %}bg-indigo-50 text-brand font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                                {{ category.name }}
                            </a>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </aside>

            <!-- Course Grid -->
            <div class="w-full md:w-3/4" id="course-grid-container">
                {% include 'courses/partials/course_list.html' %}
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
