{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-dark">Tizimga kirish</h2>
            <p class="mt-2 text-sm text-gray-600">
                Yoki
                <a href="{% url 'register' %}" class="font-medium text-brand hover:text-brand-hover">
                    yangi hisob yarating
                </a>
            </p>
        </div>
        
        <form class="space-y-6" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm">
                Iltimos, kiritilgan ma'lumotlarni tekshiring. Login yoki parol noto'g'ri.
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Foydalanuvchi nomi</label>
                <div class="mt-1">
                    <input id="id_username" name="username" type="text" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm">
                </div>
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700">Parol</label>
                <div class="mt-1">
                    <input id="id_password" name="password" type="password" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm">
                </div>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-colors">
                    Kirish
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
