{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-dark">Ro'yxatdan o'tish</h2>
            <p class="mt-2 text-sm text-gray-600">
                Yoki
                <a href="{% url 'login' %}" class="font-medium text-brand hover:text-brand-hover">
                    tizimga kiring
                </a>
            </p>
        </div>
        
        <form class="space-y-6" action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                <div class="mt-1">
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-sm text-red-600 mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            </div>
            {% endfor %}

            <style>
                /* Style django form fields */
                input[type="text"], input[type="password"], input[type="email"] {
                    width: 100%;
                    padding: 0.5rem 0.75rem;
                    border: 1px solid #d1d5db;
                    border-radius: 0.375rem;
                    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
                }
                input:focus {
                    outline: 2px solid transparent;
                    outline-offset: 2px;
                    border-color: #4f46e5;
                    box-shadow: 0 0 0 1px #4f46e5;
                }
            </style>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-colors">
                    Ro'yxatdan o'tish
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
